<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandapat Jennelle Creatives</title>
    <link rel="stylesheet" href="style2.css">

    <style>
        :root {
            --primary-dark: #222;
            --accent-color: #ffcc00;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
            background: #f4f4f4; /* Fallback color */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Improved Background Handling */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("logo.jpeg") no-repeat center center/cover; 
            opacity: 0.4; 
            z-index: -1; 
        }

        .navbar {
            background-color: rgba(34, 34, 34, 0.98); 
            padding: 15px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .navbar a:hover {
            color: var(--accent-color); 
        }

        /* Improved Card Responsiveness */
        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            width: 90%;
            max-width: 600px; /* Slimmer card looks more professional */
            margin: 100px 20px 40px; /* Space for fixed navbar */
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .profile {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .profile {
            transform: scale(1.05);
        }

        .card h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
        }

        .card p {
            line-height: 1.8;
            color: #444;
            font-size: 1.05rem;
            margin-bottom: 20px;
        }
