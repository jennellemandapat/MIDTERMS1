<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Mandapat Jennelle Creatives</title>

    <style>
        /* Shared Design Variables */
        :root {
            --accent: #ffcc00;
            --dark: #222;
            --glass: rgba(255, 255, 255, 0.75);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background - Matches Gallery & Contact */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("logo.jpeg") no-repeat center center/cover; 
            opacity: 0.4; 
            z-index: -1; 
        }

        /* Navbar - Matches all pages */
        .navbar {
            background-color: rgba(34, 34, 34, 0.95); 
            backdrop-filter: blur(8px);
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--accent);
            font-weight: 600;
        }

        /* Main Glass Card */
        .card {
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            width: 90%;
            max-width: 800px;
            margin: 100px 20px 40px; 
            padding: 50px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0px 20px 40px rgba(0,0,0,0.15);
        }

        .card h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .card p {
            line-height: 1.8;
            color: #444;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto; 
        }

        /* Feature Gallery Section */
        .gallery {
            display: flex;
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .gallery img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 15px;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery img:hover {
            transform: scale(1.1) rotate(2deg); 
        }

        /* Unified Button Style */
        .button {
            display: inline-block;
            padding: 14px 40px;
            background-color: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 50px; 
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .button:hover {
            background-color: #000;
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Mobile Tweaks */
        @media (max-width: 600px) {
            .navbar a { margin: 0 10px; font-size: 14px; }
            .card h1 { font-size: 2rem; }
            .gallery img { width: 120px; height: 120px; margin: 10px; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="card">
        <h1>Jennelle Mandapat</h1>
        <p>Creativity meets technical precision. I specialize in building modern digital experiences with a focus on clean design and interactive performance.</p>

        <div class="gallery">
            <img src="jen pic.png" alt="Graphic Design">
            <img src="logo.jpeg" alt="Branding">
            <img src="jen pic.png" alt="Web Development">
        </div>

        <a class="button" href="gallery.html">Explore My Work</a>
    </main>

</body>
</html>
