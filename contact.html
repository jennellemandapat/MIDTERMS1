<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mandapat Jennelle Creatives</title>

    <style>
        :root {
            --accent: #ffcc00;
            --dark: #222;
            --glass: rgba(255, 255, 255, 0.75);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("logo.jpeg") no-repeat center center/cover; 
            opacity: 0.4; 
            z-index: -1; 
        }

        .navbar {
            background: rgba(34, 34, 34, 0.95);
            backdrop-filter: blur(8px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--accent);
            opacity: 1;
            font-weight: 600;
        }

        .card {
            width: 90%;
            max-width: 900px;
            margin: 60px auto;
            background: var(--glass); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 30px; 
            color: var(--dark);
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap; 
            gap: 40px;
        }

        .info, .form-container {
            flex: 1;
            min-width: 280px; 
        }

        .info h3 { color: var(--dark); margin-top: 0; font-size: 1.5rem; }
        .info p { line-height: 1.8; color: #444; margin: 15px 0; }
        .info b { color: var(--dark); }

        /* Form Styling */
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.1);
        }

        button {
            width: 100%; /* Better for mobile */
            background: var(--dark);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .card { padding: 25px; margin: 30px auto; }
            .navbar a { margin: 0 8px; font-size: 0.9rem; }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html" class="active">Contact</a>
</nav>

<main class="card">
    <h1>Get in Touch</h1>

    <div class="container">
        <section class="info">
            <h3>Contact Details</h3>
            <p>I'm always open to discussing new projects, creative ideas, or opportunities to be part of your visions.</p>
            
            <p><b>Email:</b> jennelle102816@gmail.com</p>
            <p><b>Phone:</b> 0975 450 6045</p>
            <p><b>Location:</b> Lower Ferguson Road, Guisad, Baguio City, Philippines 2600</p>
        </section>

        <section class="form-container">
            <form action="#">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Email" required>

                <label for="subject">Subject</label>
                <input type="text" id="subject" placeholder="How can I help?">

                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="Your message here..."></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </div>
</main>

</body>
</html>
