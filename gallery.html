<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mandapat Jennelle Creatives</title>
    <style>
        :root {
            --primary-dark: #222;
            --accent-color: #ffcc00;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("logo.jpeg") no-repeat center center;
            background-size: cover; 
            opacity: 0.4; 
            z-index: -1; 
        }

        .navbar {
            background-color: rgba(34, 34, 34, 0.95); 
            backdrop-filter: blur(8px);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .navbar a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--accent-color); 
            border-bottom: 2px solid var(--accent-color);
        }

        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            width: 95%;
            max-width: 1100px; 
            margin: 140px auto 60px;
            padding: 50px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary-dark); }
        .subtitle { margin-bottom: 40px; color: #555; font-size: 1.1rem; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 35px;
            margin-top: 20px;
        }

        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .gallery img {
            width: 160px;  
            height: 160px; 
            border-radius: 50%; 
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery-item:hover img {
            transform: scale(1.1) rotate(3deg);
            border-color: var(--accent-color);
        }

        .gallery p {
            margin-top: 15px;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary-dark);
        }

        .button {
            display: inline-block;
            margin-top: 50px;
            padding: 14px 40px;
            background: var(--primary-dark);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .button:hover {
            background: #000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            .navbar a { margin: 0 10px; font-size: 14px; }
            .card { padding: 40px 20px; margin-top: 120px; }
            .gallery img { width: 140px; height: 140px; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="card">
        <h1>Creative Portfolio</h1>
        <p class="subtitle">A showcase of my recent designs, logos, and web projects.</p>

        <div class="gallery">
            <div class="gallery-item">
                <img src="logo.jpeg" alt="Project 1">
                <p>Vaprix Logo Design</p>
            </div>
            <div class="gallery-item">
                <img src="jen pic.png" alt="Project 2">
                <p>Portrait Edit</p>
            </div>
            <div class="gallery-item">
                <img src="logo.jpeg" alt="P3">
                <p>Branding V2</p>
            </div>
            <div class="gallery-item">
                <img src="jen pic.png" alt="P4">
                <p>Digital Art</p>
            </div>
            <div class="gallery-item">
                <img src="logo.jpeg" alt="P5">
                <p>Marketing Poster</p>
            </div>
            <div class="gallery-item">
                <img src="jen pic.png" alt="P6">
                <p>Web Mockup</p>
            </div>
            <div class="gallery-item">
                <img src="logo.jpeg" alt="P7">
                <p>Graphic Asset</p>
            </div>
            <div class="gallery-item">
                <img src="jen pic.png" alt="P8">
                <p>Project Beta</p>
            </div>
        </div>

        <a href="https://github.com/jennellemandapat" class="button" target="_blank">View More on GitHub</a>
    </main>

</body>
</html>
